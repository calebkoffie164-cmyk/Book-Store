<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="bookstore"></section>
    <h1 class="head">Bookstore</h1>
    <p class="text">Browse Your Favorite Books</p>

  <div class="grid-container">
  <div class="card">
    <div class="image-wrapper">
      <img src="images/become.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">Vic Johnson</span>
      <span class="title">Imagine</span>
    </div>
  </div>

  <div class="card">
    <div class="image-wrapper">
      <img src="images/facts.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">Jaxon Pryde</span>
      <span class="title">1500 Unknown Facts</span>
    </div>
  </div>

  <div class="card">
    <div class="image-wrapper">
      <img src="images/failure.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">Martin Meadows</span>
      <span class="title">Failure To Success</span>
    </div>
  </div>

  <div class="card">
    <div class="image-wrapper">
      <img src="images/leader.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">Rasmus Hougaard</span>
      <span class="title">Mind Of A Leader</span>
    </div>
  </div>

  <div class="card">
    <div class="image-wrapper">
      <img src="images/silence.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">Praise George</span>
      <span class="title">Move In Silence</span>
    </div>
  </div>

  <div class="card">
    <div class="image-wrapper">
      <img src="images/never lost.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">Carol Haglar</span>
      <span class="title">Never Lost</span>
    </div>
  </div>

  <div class="card">
    <div class="image-wrapper">
      <img src="images/people.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">James W. Williams</span>
      <span class="title">Read People Like A Book</span>
    </div>
  </div>

  <div class="card">
    <div class="image-wrapper">
      <img src="images/power.webp" alt="Book Cover">
    </div>
    <div class="card-info">
      <span class="author">Daniel Walter</span>
      <span class="title">Power Of Discipline</span>
    </div>
  </div>

</div>
    
</body>
</html>
